<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Catálogo de Tecnología</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ─── Topbar ─────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-logo">Nova<span>Byte</span></div>
    <button class="cart-btn" id="cartBtn" aria-label="Abrir carrito de compras">
      🛒 Carrito
      <span class="cart-badge" id="cartBadge" style="display:none">0</span>
    </button>
  </header>

  <!-- ─── Hero ───────────────────────────────────────────── -->
  <section class="hero">
    <div>
      <div class="hero-sub">— Catálogo 2025</div>
      <h1 class="hero-title">Lo mejor en<br><em>tecnología</em></h1>
    </div>
    <div class="hero-count">12 productos disponibles</div>
  </section>

  <!-- ─── Filtros ─────────────────────────────────────────── -->
  <nav class="filters" id="filters" aria-label="Filtrar por categoría"></nav>

  <!-- ─── Catálogo ────────────────────────────────────────── -->
  <main class="products-section">
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- ─── Cart Overlay ────────────────────────────────────── -->
  <div class="cart-overlay" id="cartOverlay" aria-hidden="true"></div>

  <!-- ─── Cart Drawer ─────────────────────────────────────── -->
  <aside class="cart-drawer" id="cartDrawer" aria-label="Carrito de compras">

    <!-- Header -->
    <div class="cart-header">
      <div class="cart-header-left">
        <div class="cart-header-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <div>
          <div class="cart-title">Mi carrito</div>
          <div class="cart-subtitle" id="cartSubtitle">0 productos</div>
        </div>
      </div>
      <button class="cart-close" id="cartClose" aria-label="Cerrar carrito">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Free shipping progress -->
    <div class="shipping-bar" id="shippingBar">
      <div class="shipping-bar-text">
        <span id="shippingMsg">Agrega productos para ver el envío</span>
      </div>
      <div class="shipping-track">
        <div class="shipping-fill" id="shippingFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Items list -->
    <div class="cart-items" id="cartItems"></div>

    <!-- Footer -->
    <div class="cart-footer">
      <div class="cart-summary">
        <div class="cart-row">
          <span class="row-label">Subtotal</span>
          <span class="row-val" id="subtotal">$0</span>
        </div>
        <div class="cart-row">
          <span class="row-label">
            IVA
            <span class="row-tag">19%</span>
          </span>
          <span class="row-val" id="tax">$0</span>
        </div>
        <div class="cart-row shipping-row">
          <span class="row-label">Envío</span>
          <span class="row-val free-shipping" id="shippingCost">Calculando…</span>
        </div>
      </div>

      <div class="cart-total-block">
        <div class="cart-total-label">Total a pagar</div>
        <div class="cart-total-val" id="total">$0</div>
      </div>

      <button class="checkout-btn" id="checkoutBtn">
        <span>Finalizar compra</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <div class="cart-footer-meta">
        <div class="payment-icons">
          <span class="pay-icon">💳</span>
          <span class="pay-icon">🏦</span>
          <span class="pay-icon">📱</span>
        </div>
        <button class="clear-btn" id="clearCartBtn">Vaciar carrito</button>
      </div>
    </div>
  </aside>

  <!-- ─── Toasts ───────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- ─── Scripts ─────────────────────────────────────────── -->
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
